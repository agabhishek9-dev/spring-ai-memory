spring.application.name=springai
server.port=8081

# Reads API key from environment variable.
spring.ai.openai.api-key=${OPENAI_API_KEY}

# Global default temperature if not overridden elsewhere.
spring.ai.openai.chat.options.temperature=1.0

# Optional experimental properties kept for future testing.
# spring.ai.chat.client.enabled=false
# spring.ai.openai.chat.options.model=gpt-4.1
#
# ----------------------------------------------------------
# CONCEPT 1: Advisor-level debug logging
# ----------------------------------------------------------
# Enables DEBUG logs only for Spring AI chat client advisors.
#
# Why useful:
# - helps observe advisor execution flow
# - helps debug memory advisor, logger advisor, and custom advisors
# - gives more detail without turning the whole application to DEBUG
logging.level.org.springframework.ai.chat.client.advisor=DEBUG


# ----------------------------------------------------------
# CONCEPT 2: MySQL datasource configuration
# ----------------------------------------------------------
# JDBC connection URL for the application's relational database.
#
# Database used here:
# spring_ai
#
# useSSL=false:
# disables SSL for local development connection.
spring.datasource.url=jdbc:mysql://localhost:3306/spring_ai?useSSL=false

# Database username used for the datasource connection.
spring.datasource.username=root

# Database password used for the datasource connection.
spring.datasource.password=Abhi@SQL91


# ----------------------------------------------------------
# CONCEPT 3: JDBC chat memory schema initialization
# ----------------------------------------------------------
# Controls when Spring AI should create the chat memory table schema.
#
# Supported values:
# - embedded -> initialize only for embedded DBs (default)
# - always   -> always initialize schema on startup
# - never    -> never initialize automatically
#
# Since MySQL is not an embedded database, using ALWAYS ensures that
# Spring AI creates the chat memory table automatically at startup
# if schema auto-initialization is desired. [web:71][web:92]
spring.ai.chat.memory.repository.jdbc.initialize-schema=ALWAYS



#| Property                                                                 | Meaning                                                                                                                       |
#| ------------------------------------------------------------------------ | ----------------------------------------------------------------------------------------------------------------------------- |
#| logging.level.org.springframework.ai.chat.client.advisor=DEBUG           | Enables detailed debug logs specifically for Spring AI advisor classes without turning on debug for the whole app. baeldung+1 |
#| spring.datasource.url=jdbc:mysql://localhost:3306/spring_ai?useSSL=false | Connects the app to a MySQL database named spring_ai running on localhost port 3306.                                          |
#| spring.datasource.username=root                                          | Uses root as the DB login username.                                                                                           |
#| spring.datasource.password=...                                           | Supplies the DB password for the datasource connection.                                                                       |
#| spring.ai.chat.memory.repository.jdbc.initialize-schema=ALWAYS           | Forces Spring AI to initialize the JDBC chat memory schema even for non-embedded databases like MySQL. spring+1               |